<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gestão Diário Oficial</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
      <div class="card shadow-lg" style="max-width: 450px; width: 100%;">
        <div class="card-header bg-primary text-white text-center">
          <h2 class="h4 mb-0">Gestão Diário Oficial</h2>
          <p class="mb-0 small">Sistema de Distribuição</p>
        </div>
        <div class="card-body p-4">
          <form id="loginForm" class="vstack gap-3">
            <div>
              <label for="tipoUsuario" class="form-label fw-semibold">Tipo de usuário</label>
              <select id="tipoUsuario" class="form-select" required>
                <option value="">Selecione...</option>
                <option value="admin">Administrador</option>
                <option value="funcionario">Funcionário do Poupatempo</option>
                <option value="parceiro">Parceiro</option>
              </select>
            </div>
            <div id="campoEmail" style="display: none;">
              <label for="emailLogin" class="form-label fw-semibold">E-mail</label>
              <input type="email" id="emailLogin" class="form-control" placeholder="seu@email.com" />
            </div>
            <div>
              <label for="senhaLogin" class="form-label fw-semibold">Senha</label>
              <input type="password" id="senhaLogin" class="form-control" placeholder="Digite sua senha" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
            <div id="mensagemLogin" class="alert alert-danger d-none" role="alert"></div>
          </form>
          <div class="mt-3 text-center">
            <small class="text-muted">
              <strong>Credenciais padrão:</strong><br />
              <strong>Funcionário:</strong> use o e-mail e senha fornecidos pelo administrador<br />
              <strong>Parceiro:</strong> use o e-mail e senha fornecidos pelo administrador
            </small>
          </div>
        </div>
      </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Configuração do Supabase -->
    <script src="supabase-config.js"></script>
    <!-- Funções de acesso ao banco -->
    <script src="supabase-db.js"></script>
    <script src="auth.js"></script>
    <script src="login.js"></script>
  </body>
</html>
